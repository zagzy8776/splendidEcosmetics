<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FADADD"/>
      <stop offset="100%" stop-color="#F2C4BC"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C547"/>
      <stop offset="50%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#A8841A"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bgGrad)"/>
  <!-- Gold border ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <!-- "Se" monogram -->
  <text x="32" y="42" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="28" 
    font-style="italic"
    font-weight="700"
    text-anchor="middle" 
    fill="url(#goldGrad)"
    letter-spacing="-1">Se</text>
</svg>
